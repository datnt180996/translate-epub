<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Ebook Translator{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Literata:ital,wght@0,400;0,500;0,700;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    :root {
      /* Dark blue palette (Demo) */
      --bg: #0b1326;
      --surface: #0b1326;
      --surface-dim: #0b1326;
      --surface-bright: #31394d;
      --surface-lowest: #060e20;
      --surface-low: #131b2e;
      --surface-container: #171f33;
      --surface-high: #222a3d;
      --surface-highest: #2d3449;
      --surface-variant: #2d3449;

      --on-surface: #dae2fd;
      --on-surface-variant: #bec8d2;
      --on-surface-muted: #88929b;

      --outline: #88929b;
      --outline-variant: #3e4850;

      --primary: #89ceff;
      --on-primary: #00344d;
      --primary-container: #0ea5e9;
      --on-primary-container: #003751;
      --primary-fixed: #c9e6ff;
      --primary-fixed-dim: #89ceff;

      --secondary: #4fdbc8;
      --on-secondary: #003731;
      --secondary-container: #04b4a2;
      --on-secondary-container: #003f38;

      --tertiary: #c0c1ff;
      --on-tertiary: #1000a9;
      --tertiary-container: #8d90ff;
      --on-tertiary-container: #1407ad;

      --error: #ffb4ab;
      --on-error: #690005;
      --error-container: #93000a;
      --on-error-container: #ffdad6;

      --indigo: #6366f1;
      --indigo-soft: #4f46e5;

      --success: #4ade80;
      --success-bg: #1d4a2f;
      --warn: #f59e0b;
      --warn-bg: #fef3c7;
      --warn-on: #b45309;
      --danger: #ffb4ab;
      --danger-bg: #4a1d1d;

      --sidebar-w: 260px;
      --topbar-h: 64px;
      --reading-width: 720px;
      --container-max: 1200px;

      --radius-sm: 4px;
      --radius: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", sans-serif;
      background: var(--bg);
      color: var(--on-surface);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 22px;
      vertical-align: middle;
      user-select: none;
    }
    .material-symbols-outlined.fill {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    a { color: var(--on-surface); text-decoration: none; transition: color 0.15s ease; }
    a:hover { color: var(--primary); }

    h1, h2, h3, h4 { color: var(--on-surface); font-weight: 600; letter-spacing: -0.01em; margin: 0; }
    h1 { font-size: 28px; line-height: 1.2; }
    h2 { font-size: 22px; line-height: 1.25; }
    h3 { font-size: 17px; line-height: 1.3; }
    h4 { font-size: 15px; line-height: 1.3; }

    code {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      background: var(--surface-high);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.92em;
      color: var(--on-surface);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--sidebar-w);
      background: var(--surface-low);
      border-right: 1px solid var(--outline-variant);
      z-index: 60;
      display: flex;
      flex-direction: column;
      transition: transform 0.25s ease;
    }
    .sidebar-brand {
      padding: 24px 24px 16px;
      margin-bottom: 16px;
    }
    .sidebar-brand h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .sidebar-brand p {
      font-size: 12px;
      color: var(--on-surface-muted);
      letter-spacing: 0.02em;
      margin: 6px 0 0 0;
    }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sidebar-nav a.nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius);
      color: var(--on-surface-variant);
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s ease, color 0.15s ease;
      border-left: 4px solid transparent;
    }
    .sidebar-nav a.nav-item:hover {
      background: rgba(45,52,73,0.4);
      color: var(--on-surface);
    }
    .sidebar-nav a.nav-item.active {
      background: rgba(14,165,233,0.1);
      color: var(--primary);
      border-left-color: var(--primary);
    }
    .sidebar-nav a.nav-item .material-symbols-outlined { font-size: 20px; }
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--outline-variant);
      font-size: 12px;
      color: var(--on-surface-muted);
    }

    /* ===== TOPBAR ===== */
    .topbar {
      display: none;
    }
    .topbar nav { display: flex; gap: 4px; }
    .topbar nav a {
      padding: 8px 14px;
      border-radius: 999px;
      color: var(--on-surface-variant);
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .topbar nav a:hover { color: var(--on-surface); background: var(--surface-high); }
    .topbar nav a.active { color: var(--primary); }
    .topbar-spacer { flex: 1; }
    .topbar-search {
      position: relative;
      width: 240px;
    }
    .topbar-search input {
      width: 100%;
      background: var(--surface-high);
      border: 1px solid var(--outline-variant);
      border-radius: 999px;
      color: var(--on-surface);
      padding: 8px 16px 8px 38px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .topbar-search input::placeholder { color: var(--on-surface-muted); }
    .topbar-search .material-symbols-outlined {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: var(--on-surface-muted);
      pointer-events: none;
    }
    .topbar-icon-btn {
      background: none;
      border: none;
      color: var(--on-surface-variant);
      padding: 8px;
      border-radius: 999px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .topbar-icon-btn:hover { background: var(--surface-high); color: var(--on-surface); }

    /* ===== MAIN ===== */
    .main-content {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
    }
    .main-inner {
      max-width: var(--container-max);
      margin: 0 auto;
      padding: 32px 32px 64px;
    }

    /* Mobile sidebar toggle */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 55;
    }
    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--on-surface);
      padding: 8px;
      cursor: pointer;
      border-radius: var(--radius);
    }
    .mobile-menu-btn:hover { background: var(--surface-high); }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.show { display: block; }
      .mobile-menu-btn { display: grid; place-items: center; }
      .topbar {
        position: sticky;
        top: 0;
        left: 0;
        right: 0;
        height: var(--topbar-h);
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--outline-variant);
      }
      .topbar nav,
      .topbar-search,
      .topbar-spacer {
        display: none;
      }
      .main-content { margin-left: 0; }
      .main-inner { padding: 24px 16px 64px; }
    }

    /* ===== FLASH ===== */
    .flash-area { margin-bottom: 20px; }

    /* ===== CARDS ===== */
    .card {
      background: var(--surface-container);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-xl);
      padding: 24px;
      margin-bottom: 16px;
    }
    .card.compact { padding: 18px; }

    /* ===== GRID ===== */
    .grid { display: grid; gap: 16px; }
    .grid.cols-2 { grid-template-columns: 1fr; }
    .grid.cols-3 { grid-template-columns: 1fr; }
    .grid.library { grid-template-columns: 1fr; }
    @media (min-width: 640px) {
      .grid.cols-2 { grid-template-columns: 1fr 1fr; }
      .grid.cols-3 { grid-template-columns: 1fr 1fr; }
      .grid.library { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 900px) {
      .grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
      .grid.library { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 1200px) {
      .grid.library { grid-template-columns: repeat(4, 1fr); }
    }

    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .row.between { justify-content: space-between; align-items: flex-start; }

    /* ===== FORMS ===== */
    label {
      display: block;
      margin-bottom: 8px;
      color: var(--on-surface-variant);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }
    input[type="text"], input[type="url"], input[type="password"], input[type="file"], textarea, select {
      width: 100%;
      background: var(--surface-lowest);
      color: var(--on-surface);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius);
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input[type="text"]:focus, input[type="url"]:focus, input[type="password"]:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--on-surface);
      box-shadow: 0 0 0 3px rgba(229,226,225,0.08);
    }
    input[type="file"] { padding: 8px; cursor: pointer; }
    input[type="file"]::file-selector-button {
      background: var(--surface-high); color: var(--on-surface);
      border: 1px solid var(--outline-variant); border-radius: var(--radius);
      padding: 8px 14px; font-size: 13px; font-family: inherit; cursor: pointer;
      margin-right: 12px; transition: background 0.15s ease;
    }
    input[type="file"]::file-selector-button:hover { background: var(--surface-highest); }
    textarea { min-height: 110px; line-height: 1.6; resize: vertical; }
    .help-text { margin-top: 6px; font-size: 13px; color: var(--on-surface-muted); line-height: 1.5; }
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .form-row > * { flex: 1; min-width: 140px; }

    /* ===== BUTTONS ===== */
    button, .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--primary); color: var(--on-primary);
      border: 1px solid transparent; border-radius: 999px;
      padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 600;
      font-family: inherit; letter-spacing: 0.01em;
      transition: opacity 0.15s ease, transform 0.05s ease, background 0.15s ease;
    }
    button:hover, .btn:hover { opacity: 0.88; }
    button:active, .btn:active { transform: translateY(1px); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.secondary, .btn.secondary {
      background: transparent; color: var(--on-surface);
      border: 1px solid var(--outline-variant);
    }
    button.secondary:hover, .btn.secondary:hover { background: var(--surface-high); opacity: 1; }
    button.danger, .btn.danger {
      background: transparent; color: var(--error);
      border: 1px solid var(--error-container);
    }
    button.danger:hover, .btn.danger:hover { background: var(--error-container); opacity: 1; }
    .button-row { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ===== BADGES ===== */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 500; letter-spacing: 0.02em;
      background: var(--surface-high); color: var(--on-surface-variant);
      border: 1px solid var(--outline-variant);
    }
    .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .badge.pending { color: #cfd5e0; background: var(--surface-highest); }
    .badge.fetched { color: #9ec3ff; background: rgba(110,168,255,0.12); border-color: rgba(110,168,255,0.25); }
    .badge.fetching { color: #e3c97a; background: var(--warn-bg); border-color: rgba(245,158,11,0.3); }
    .badge.translating { color: #c9a3e3; background: rgba(139,92,246,0.12); border-color: rgba(139,92,246,0.25); }
    .badge.translated { color: #87e1a3; background: rgba(74,222,128,0.12); border-color: rgba(74,222,128,0.25); }
    .badge.error { color: var(--error); background: var(--danger-bg); border-color: rgba(255,180,171,0.3); }
    .badge.glossary { color: var(--on-surface-variant); }
    .badge.tag { background: var(--surface-high); color: var(--on-surface-variant); }

    /* ===== ALERTS ===== */
    .alert {
      padding: 14px 18px; border-radius: var(--radius-lg); margin-bottom: 16px;
      border: 1px solid var(--outline-variant); background: var(--surface-low);
      color: var(--on-surface); font-size: 14px; line-height: 1.5;
    }
    .alert b { color: var(--on-surface); }
    .alert.info { background: rgba(110,168,255,0.08); border-color: rgba(110,168,255,0.2); color: #b9d4ff; }
    .alert.success { background: rgba(74,222,128,0.08); border-color: rgba(74,222,128,0.2); color: #a3edb9; }
    .alert.error { background: var(--danger-bg); border-color: rgba(255,180,171,0.25); color: #ffb0b0; }
    .alert.warn { background: var(--warn-bg); border-color: rgba(245,158,11,0.25); color: #e3c97a; }
    .alert .alert-title {
      display: block; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; font-size: 12px; margin-bottom: 4px;
    }

    /* ===== TABLES ===== */
    .table-wrap {
      border: 1px solid var(--outline-variant); border-radius: var(--radius-lg);
      overflow: hidden; background: var(--surface-low);
    }
    table.data { width: 100%; border-collapse: collapse; font-size: 14px; }
    table.data th, table.data td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--outline-variant); }
    table.data th {
      color: var(--on-surface-muted); font-weight: 500; font-size: 12px;
      letter-spacing: 0.08em; text-transform: uppercase; background: var(--surface-container);
    }
    table.data tr:last-child td { border-bottom: none; }
    table.data tr:hover td { background: var(--surface); }

    /* ===== CHAPTER LIST ===== */
    .chapter-list-wrap {
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-lg);
      background: var(--surface-low);
      max-height: 600px; overflow-y: auto;
    }
    .chapter-list-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid var(--outline-variant);
      transition: background 0.12s ease;
    }
    .chapter-list-item:last-child { border-bottom: none; }
    .chapter-list-item:hover { background: var(--surface); }
    .chapter-list-item .chapter-idx {
      color: var(--on-surface-muted); font-size: 13px;
      font-variant-numeric: tabular-nums; min-width: 38px;
    }
    .chapter-list-item .chapter-title { flex: 1; font-size: 14px; }
    .chapter-list-item .chapter-title a { color: var(--on-surface); }
    .chapter-list-item .chapter-title a:hover { color: var(--primary); }

    /* ===== STATS ===== */
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
    @media (min-width: 720px) { .stats { grid-template-columns: repeat(4, 1fr); } }
    .stat-card {
      background: var(--surface-low); border: 1px solid var(--outline-variant);
      border-radius: var(--radius-lg); padding: 16px 18px;
    }
    .stat-card .label {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--on-surface-muted); margin-bottom: 6px;
    }
    .stat-card .value {
      font-size: 24px; font-weight: 600; color: var(--on-surface);
      letter-spacing: -0.01em; font-family: 'Literata', serif;
    }

    /* ===== PROGRESS ===== */
    .progress-block {
      background: var(--surface-low); border: 1px solid var(--outline-variant);
      border-radius: var(--radius-lg); padding: 16px 18px; margin-top: 14px;
    }
    .progress-block .progress-meta {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; color: var(--on-surface-variant); margin-bottom: 8px;
    }
    .progress-track { background: var(--surface-highest); border-radius: 999px; height: 8px; overflow: hidden; }
    .progress-fill { background: var(--primary); height: 100%; border-radius: 999px; transition: width 0.4s ease; }
    .progress-fill.indigo { background: var(--indigo); }

    /* ===== READING AREA ===== */
    .reading-area {
      background: var(--surface-low); border: 1px solid var(--outline-variant);
      border-radius: var(--radius-xl); padding: 36px 40px;
      line-height: 1.95; font-family: 'Literata', serif; font-size: 19px;
      color: var(--on-surface); max-width: var(--reading-width); margin: 0 auto;
    }
    .reading-area.chinese { font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", serif; }
    .reading-area p { margin: 0 0 1.4em; padding: 0; }
    .reading-area p:last-child { margin-bottom: 0; }
    .reading-pair { display: grid; gap: 24px; margin-top: 24px; }
    @media (min-width: 880px) { .reading-pair { grid-template-columns: 1fr 1fr; } }
    .reading-pair .reading-label, .reading-label {
      font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--on-surface-muted); margin-bottom: 10px; text-align: center;
    }

    /* ===== TABS ===== */
    .tabs {
      display: inline-flex; background: var(--surface-low);
      border: 1px solid var(--outline-variant); border-radius: 999px; padding: 4px; gap: 2px;
    }
    .tabs a {
      padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 500;
      color: var(--on-surface-variant); transition: background 0.15s ease, color 0.15s ease;
    }
    .tabs a:hover { color: var(--on-surface); }
    .tabs a.active { background: var(--primary); color: var(--on-primary); }

    /* ===== EMPTY STATE ===== */
    .empty { text-align: center; padding: 48px 24px; color: var(--on-surface-variant); }
    .empty .empty-mark {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--surface-high); border: 1px solid var(--outline-variant);
      display: grid; place-items: center; margin: 0 auto 16px;
      font-size: 22px; color: var(--on-surface-muted);
    }
    .empty p { margin: 0; font-size: 14px; }

    /* ===== NOVEL CARD (library grid) ===== */
    .novel-card {
      background: var(--surface-container);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: border-color 0.15s ease, transform 0.1s ease;
      display: flex; flex-direction: column;
    }
    .novel-card:hover { border-color: var(--on-surface-muted); transform: translateY(-2px); }
    .novel-cover {
      height: 140px;
      background: linear-gradient(135deg, var(--surface-high) 0%, var(--surface-lowest) 100%);
      display: grid; place-items: center;
      position: relative;
      border-bottom: 1px solid var(--outline-variant);
    }
    .novel-cover .cover-icon {
      font-size: 48px;
      color: var(--on-surface-muted);
      opacity: 0.5;
    }
    .novel-cover .source-tag {
      position: absolute; top: 10px; right: 10px;
    }
    .novel-body { padding: 16px 18px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .novel-body h3 { font-size: 16px; font-weight: 600; line-height: 1.3; }
    .novel-body h3 a { color: var(--on-surface); }
    .novel-body h3 a:hover { color: var(--primary); }
    .novel-body .novel-meta { font-size: 13px; color: var(--on-surface-muted); }
    .novel-body .novel-orig { font-size: 12px; color: var(--on-surface-muted); font-style: italic; }
    .novel-actions { display: flex; gap: 8px; padding: 0 18px 16px; }
    .novel-actions .btn { padding: 6px 14px; font-size: 13px; }

    /* ===== PROVIDER CARD ===== */
    .provider-card {
      background: var(--surface-low); border: 1px solid var(--outline-variant);
      border-radius: var(--radius-xl); padding: 24px; margin-bottom: 16px;
    }
    .provider-card.provider-card-default {
      border-color: var(--primary);
      box-shadow: 0 0 0 1px var(--primary) inset;
    }
    .provider-card .provider-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 8px;
    }
    .provider-card .provider-name { font-size: 18px; font-weight: 600; text-transform: capitalize; }
    .provider-card .provider-meta { color: var(--on-surface-muted); font-size: 13px; margin-bottom: 18px; }

    /* ===== UTILITY ===== */
    .muted { color: var(--on-surface-muted); font-size: 13px; }
    .text-small { font-size: 13px; }
    .stack-sm > * + * { margin-top: 8px; }
    .stack > * + * { margin-top: 16px; }
    .stack-lg > * + * { margin-top: 24px; }
    .divider { height: 1px; background: var(--outline-variant); margin: 24px 0; }
    .page-header { margin-bottom: 24px; }
    .page-header .eyebrow {
      font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--on-surface-muted); margin-bottom: 6px;
    }

    /* ===== HOMEPAGE ===== */
    .page-greeting {
      margin-bottom: 32px;
    }
    .page-greeting h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 40px;
      margin: 0 0 6px 0;
      color: var(--on-surface);
    }
    .page-greeting p {
      color: var(--on-surface-variant);
      font-size: 15px;
      margin: 0;
    }

    .api-warn {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.45);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 32px;
      box-shadow: var(--shadow-sm);
    }
    .api-warn .api-warn-icon {
      color: var(--warn);
      flex-shrink: 0;
      margin-top: 2px;
    }
    .api-warn .api-warn-body { flex: 1; }
    .api-warn .api-warn-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--warn);
      margin-bottom: 4px;
    }
    .api-warn .api-warn-desc {
      font-size: 13px;
      color: var(--on-surface-variant);
      line-height: 1.5;
    }
    .api-warn a { color: var(--primary); text-decoration: none; }
    .api-warn a:hover { text-decoration: underline; }
    .api-warn-close {
      background: none;
      border: none;
      color: var(--on-surface-variant);
      padding: 4px;
      border-radius: var(--radius);
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .api-warn-close:hover { color: var(--on-surface); background: rgba(255,255,255,0.05); }
    .api-warn-close .material-symbols-outlined { font-size: 18px; }

    .import-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 40px;
    }
    @media (min-width: 768px) {
      .import-grid { grid-template-columns: 1fr 1fr; }
    }

    .import-card {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-xl);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }
    .import-card:hover { border-color: rgba(14,165,233,0.5); }
    .import-card-head {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .import-card-head .import-card-icon {
      font-size: 22px;
      color: var(--primary);
    }
    .import-card-head .import-card-icon.secondary { color: var(--secondary); }
    .import-card-head h3 {
      font-size: 17px;
      font-weight: 600;
      margin: 0;
      color: var(--on-surface);
    }
    .import-card-desc {
      color: var(--on-surface-variant);
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
      min-height: 40px;
    }
    .import-card-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: auto;
    }
    .import-card input[type="url"] {
      background: var(--surface-lowest);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 14px;
      color: var(--on-surface);
      font-family: inherit;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .import-card input[type="url"]::placeholder {
      color: rgba(190,200,210,0.5);
    }
    .import-card input[type="url"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.18);
    }
    .import-card .btn-primary-solid {
      background: var(--primary-container);
      color: #ffffff;
      border: none;
      border-radius: var(--radius-lg);
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
      transition: background 0.15s ease, transform 0.05s ease;
    }
    .import-card .btn-primary-solid:hover { background: rgba(14,165,233,0.9); }
    .import-card .btn-primary-solid:active { transform: translateY(1px); }
    .import-card .btn-outline {
      background: transparent;
      color: var(--on-surface);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-lg);
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .import-card .btn-outline:hover {
      background: var(--surface-low);
      border-color: var(--secondary);
    }

    .dropzone {
      border: 2px dashed var(--outline-variant);
      border-radius: var(--radius-lg);
      padding: 28px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(6,14,32,0.5);
      cursor: pointer;
      transition: border-color 0.15s ease, color 0.15s ease;
      color: var(--on-surface-variant);
    }
    .dropzone:hover { border-color: rgba(79,219,200,0.5); }
    .dropzone:hover .material-symbols-outlined { color: var(--secondary); }
    .dropzone .material-symbols-outlined {
      color: var(--on-surface-variant);
      transition: color 0.15s ease;
    }
    .dropzone-text {
      font-size: 13px;
      color: var(--on-surface-variant);
      text-align: center;
      line-height: 1.5;
    }
    .dropzone input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }
    .dropzone-filename {
      font-size: 13px;
      color: var(--secondary);
      margin-top: 4px;
      word-break: break-all;
      text-align: center;
    }

    .library-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .library-section-header h2 {
      font-size: 22px;
      font-weight: 600;
      margin: 0;
      color: var(--on-surface);
    }
    .library-count {
      color: var(--on-surface-muted);
      font-size: 13px;
    }

    .glass-card {
      background: rgba(30,41,59,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.3s ease, transform 0.1s ease;
    }
    .glass-card:hover {
      border-color: rgba(14,165,233,0.5);
      box-shadow: 0 0 15px rgba(14,165,233,0.1);
    }
    .glass-cover {
      position: relative;
      aspect-ratio: 2/3;
      width: 100%;
      overflow: hidden;
      background: linear-gradient(145deg, var(--surface-high) 0%, var(--surface-lowest) 100%);
      display: grid;
      place-items: center;
    }
    .glass-cover-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      transition: opacity 0.3s ease, transform 0.5s ease;
    }
    .glass-card:hover .glass-cover-img {
      opacity: 1;
      transform: scale(1.05);
    }
    .glass-cover-icon.fallback { display: none; }
    .glass-cover-icon.fallback.show { display: inline; }
    .glass-cover-icon {
      font-size: 72px;
      color: var(--on-surface-muted);
      opacity: 0.5;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .glass-card:hover .glass-cover-icon {
      opacity: 0.8;
      transform: scale(1.05);
    }
    .glass-cover .cover-status {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: var(--radius);
      letter-spacing: 0.02em;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: var(--shadow-sm);
    }
    .cover-status.status-translating {
      background: rgba(99,102,241,0.2);
      color: var(--primary);
      border: 1px solid rgba(14,165,233,0.25);
    }
    .cover-status.status-translated {
      background: rgba(74,222,128,0.2);
      color: var(--success);
      border: 1px solid rgba(74,222,128,0.3);
    }
    .cover-status.status-pending {
      background: rgba(45,52,73,0.8);
      color: var(--on-surface-variant);
      border: 1px solid var(--outline-variant);
    }
    .cover-status.status-error {
      background: rgba(239,68,68,0.2);
      color: #ffb4ab;
      border: 1px solid rgba(239,68,68,0.3);
    }
    .cover-status.status-fetched {
      background: rgba(110,168,255,0.2);
      color: #9ec3ff;
      border: 1px solid rgba(110,168,255,0.3);
    }
    .glass-body {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .glass-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--on-surface);
      line-height: 1.3;
      margin: 0 0 4px 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.15s ease;
    }
    .glass-card:hover .glass-title { color: var(--primary); }
    .glass-author {
      font-size: 11px;
      color: var(--on-surface-muted);
      margin: 0 0 8px 0;
    }
    .glass-meta {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px;
      border-top: 1px solid rgba(62,72,80,0.5);
      font-size: 10px;
      color: var(--on-surface-muted);
    }
    .glass-meta .meta-source {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .glass-meta .meta-source .material-symbols-outlined {
      font-size: 12px;
    }
    .glass-actions {
      display: flex;
      gap: 6px;
      padding: 0 14px 12px;
    }
    .glass-actions .btn {
      padding: 6px 12px;
      font-size: 12px;
      flex: 1;
      border-radius: var(--radius);
    }
    .glass-actions .icon-btn {
      padding: 6px;
      width: 30px;
      height: 30px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--error);
      border: 1px solid rgba(239,68,68,0.3);
      cursor: pointer;
    }
    .glass-actions .icon-btn:hover { background: rgba(239,68,68,0.1); }
    .glass-actions .icon-btn .material-symbols-outlined { font-size: 16px; }

    .novel-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (min-width: 640px) { .novel-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 900px) { .novel-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1200px) { .novel-grid { grid-template-columns: repeat(5, 1fr); } }

    .library-empty {
      text-align: center;
      padding: 56px 24px;
      border: 1px dashed var(--outline-variant);
      border-radius: var(--radius-xl);
      background: rgba(13,19,38,0.5);
    }
    .library-empty .library-empty-icon {
      font-size: 48px;
      color: var(--on-surface-muted);
      opacity: 0.6;
      margin-bottom: 12px;
    }
    .library-empty h3 {
      font-size: 17px;
      color: var(--on-surface);
      margin: 0 0 6px 0;
    }
    .library-empty p {
      font-size: 13px;
      color: var(--on-surface-variant);
      margin: 0;
    }

    /* htmx */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request.htmx-indicator { display: inline; }

    /* ===== SETTINGS PAGE (API providers) ===== */
    .settings-page-header { margin-bottom: 32px; }
    .settings-page-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 40px;
      color: var(--on-surface);
      margin: 0 0 8px 0;
    }
    .settings-page-desc {
      color: var(--on-surface-variant);
      font-family: 'Literata', serif;
      font-size: 18px;
      line-height: 32px;
      max-width: 720px;
      margin: 0;
    }
    .settings-page-desc code {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      background: var(--surface-high);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.92em;
      color: var(--on-surface);
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }
    @media (min-width: 1024px) {
      .settings-grid { grid-template-columns: 1fr 1fr; }
    }

    .api-provider-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .api-provider-card-default {
      border-color: rgba(14, 165, 233, 0.3);
      box-shadow: 0 0 15px rgba(14, 165, 233, 0.05);
    }
    .api-provider-card-default::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary-container), var(--secondary-container));
    }
    .api-provider-card-empty { opacity: 0.9; }
    .api-provider-card-empty .api-provider-form,
    .api-provider-card-empty .api-provider-actions {
      opacity: 0.65;
      transition: opacity 0.15s ease;
    }
    .api-provider-card-empty:focus-within .api-provider-form,
    .api-provider-card-empty:focus-within .api-provider-actions { opacity: 1; }

    .api-provider-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .api-provider-head-left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }
    .api-provider-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--surface-container);
      border: 1px solid var(--outline-variant);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .api-provider-icon .material-symbols-outlined {
      color: var(--primary);
      font-size: 22px;
    }
    .api-provider-card-empty .api-provider-icon .material-symbols-outlined {
      color: var(--on-surface-muted);
    }
    .api-provider-name {
      font-size: 24px;
      font-weight: 600;
      color: var(--on-surface);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .api-provider-badge {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 999px;
      letter-spacing: 0.02em;
      line-height: 16px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .api-provider-badge-default {
      background: rgba(14, 165, 233, 0.2);
      color: var(--primary);
      border-color: rgba(14, 165, 233, 0.3);
    }
    .api-provider-badge-success {
      background: rgba(79, 219, 200, 0.1);
      color: var(--secondary);
      border-color: rgba(79, 219, 200, 0.2);
    }
    .api-provider-badge-tertiary {
      background: rgba(139, 144, 255, 0.1);
      color: #c0c1ff;
      border-color: rgba(139, 144, 255, 0.2);
    }
    .api-provider-badge-muted {
      background: var(--surface-variant);
      color: var(--on-surface-variant);
      border-color: rgba(62, 72, 80, 0.5);
    }

    .api-provider-head-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .api-provider-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }

    .api-provider-key-wrap { position: relative; }
    .api-provider-key-wrap input { padding-right: 42px; }
    .api-provider-key-toggle {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--on-surface-muted);
      padding: 6px;
      border-radius: 8px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: color 0.15s ease, background 0.15s ease;
      width: 32px;
      height: 32px;
    }
    .api-provider-key-toggle:hover {
      color: var(--on-surface);
      background: rgba(255, 255, 255, 0.05);
    }
    .api-provider-key-toggle .material-symbols-outlined { font-size: 20px; }

    .api-provider-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      margin-top: auto;
      border-top: 1px solid #334155;
    }
    .api-provider-actions-left {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .api-provider-action-form {
      display: inline-flex;
      margin: 0;
    }

    /* Inline star button next to provider name (set-as-default) */
    .api-provider-set-default-inline {
      display: inline-flex;
      margin: 0;
    }
    .settings-page button.api-provider-set-default-btn {
      background: transparent;
      color: var(--on-surface-muted);
      border: 1px solid transparent;
      padding: 2px 4px;
      border-radius: 6px;
      font-size: inherit;
      font-weight: inherit;
      line-height: 1;
    }
    .settings-page button.api-provider-set-default-btn:hover {
      color: var(--primary);
      background: rgba(14, 165, 233, 0.1);
      opacity: 1;
    }
    .settings-page button.api-provider-set-default-btn .material-symbols-outlined {
      font-size: 20px;
      transition: font-variation-settings 0.15s ease;
    }
    .settings-page button.api-provider-set-default-btn:hover .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* Settings-page scoped button styles (override global pill shape) */
    .settings-page button {
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0;
    }
    .settings-page button .material-symbols-outlined { font-size: 18px; }
    .settings-page button.btn-primary {
      background: var(--primary-container);
      color: #ffffff;
      border: 1px solid transparent;
    }
    .settings-page button.btn-primary:hover {
      background: rgba(14, 165, 233, 0.9);
      opacity: 1;
    }
    .settings-page button.btn-secondary {
      background: transparent;
      color: var(--on-surface);
      border: 1px solid #334155;
    }
    .settings-page button.btn-secondary:hover {
      background: #2d3449;
      opacity: 1;
    }
    .settings-page button.btn-danger {
      background: transparent;
      color: var(--error);
      border: 1px solid transparent;
      padding: 8px 12px;
    }
    .settings-page button.btn-danger:hover {
      background: rgba(147, 0, 10, 0.1);
      opacity: 1;
    }

    /* ===== NOVEL DETAIL PAGE (matches DemoUI/detail) ===== */
    .novel-detail-page {
      background: var(--bg);
    }
    .novel-detail-page {
      scrollbar-width: thin;
      scrollbar-color: rgba(137, 206, 255, 0.45) rgba(6, 14, 32, 0.65);
    }
    .novel-detail-page::-webkit-scrollbar,
    .novel-detail-page *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    .novel-detail-page::-webkit-scrollbar-track,
    .novel-detail-page *::-webkit-scrollbar-track {
      background: rgba(6, 14, 32, 0.65);
      border-radius: 999px;
    }
    .novel-detail-page::-webkit-scrollbar-thumb,
    .novel-detail-page *::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(137, 206, 255, 0.55), rgba(79, 219, 200, 0.35));
      border: 2px solid rgba(6, 14, 32, 0.85);
      border-radius: 999px;
    }
    .novel-detail-page::-webkit-scrollbar-thumb:hover,
    .novel-detail-page *::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(137, 206, 255, 0.8), rgba(79, 219, 200, 0.55));
    }
    .novel-detail-page .main-content { margin-left: 0; }
    .novel-detail-page .main-inner {
      max-width: var(--container-max);
      padding: 14px 24px 14px;
      height: 100vh;
      height: 100dvh;

      padding: 4px 12px;
      background: var(--primary-container);
      color: var(--on-primary-container);
      border: 1px solid transparent;
      border-radius: var(--radius);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      transition: filter 0.15s ease;
    }
    .nd-term-add-btn:hover { filter: brightness(1.1); }
    .nd-term-add-btn .material-symbols-outlined { font-size: 16px; }

    .nd-term-list {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      scrollbar-gutter: stable;
    }
    .nd-term {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
      border-radius: var(--radius);
      transition: background 0.15s ease;
    }
    .nd-term:hover { background: var(--surface-variant); }
    .nd-term-main { display: flex; flex-direction: column; gap: 2px; }
    .nd-term-pair {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--on-surface);
    }
    .nd-term-source { color: var(--on-surface-variant); font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", serif; }
    .nd-term-arrow { color: var(--outline); font-size: 12px; }
    .nd-term-cat {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .nd-term-cat.character { color: var(--primary-container); }
    .nd-term-cat.sect { color: var(--tertiary); }
    .nd-term-cat.place { color: var(--secondary); }
    .nd-term-cat.technique { color: #c4b5fd; }
    .nd-term-cat.item { color: #fbbf24; }
    .nd-term-cat.cultivation { color: #f472b6; }
    .nd-term-cat.other { color: var(--on-surface-variant); }
    .nd-term-delete {
      background: transparent;
      border: none;
      color: var(--outline);
      cursor: pointer;
      padding: 4px;
      border-radius: var(--radius);
      transition: color 0.15s ease, opacity 0.15s ease, background 0.15s ease;
      opacity: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .nd-term:hover .nd-term-delete { opacity: 1; }
    .nd-term-delete:hover { color: var(--error); }
    .nd-term-delete .material-symbols-outlined { font-size: 16px; }

    .nd-term-empty {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      text-align: center;
      opacity: 0.5;
    }
    .nd-term-empty .material-symbols-outlined { font-size: 24px; margin-bottom: 8px; }
    .nd-term-empty p { font-size: 12px; color: var(--on-surface-variant); margin: 0; }

    .nd-chapter-empty {
      padding: 48px 24px;
      text-align: center;
      color: var(--on-surface-variant);
    }
    .nd-chapter-empty .material-symbols-outlined { font-size: 36px; opacity: 0.5; }

    .nd-chapter-pulse {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: rgba(137,206,255,0.1);
      color: var(--primary);
      border: 1px solid rgba(137,206,255,0.2);
    }
    .nd-chapter-pulse .nd-spin { animation: nd-spin 1.2s linear infinite; font-size: 12px; }
    .nd-chapter-pulse .material-symbols-outlined { font-size: 12px; }

    @media (max-width: 768px) {
      .novel-detail-page .main-inner { height: auto; min-height: 100vh; overflow: visible; }
      .nd-grid { overflow: visible; }
      .nd-grid > .nd-card:first-child { height: auto; overflow: visible; }
      .nd-grid .nd-side-col { height: auto; overflow: visible; }
      .nd-grid .nd-side-col .nd-card:last-child { overflow: visible; }
      .nd-table-wrap { max-height: 60vh; }
      .nd-table th, .nd-table td { padding: 8px 12px; }
      .nd-pill { width: 116px; min-width: 116px; font-size: 10px; }
      .nd-table .nd-status-cell { width: 124px; }
      .nd-cover { width: 96px; height: 132px; }
      .nd-title { font-size: 24px; line-height: 30px; }
      .nd-description { -webkit-line-clamp: 3; }
    }

    /* ===== CHAPTER READER ===== */
    .chapter-reader-page {
      font-family: 'Inter', sans-serif;
      background: var(--surface-lowest);
    }
    .chapter-reader-page .sidebar,
    .chapter-reader-page .sidebar-overlay,
    .chapter-reader-page .topbar { display: none; }
    .chapter-reader-page .main-content { margin-left: 0; }
    .chapter-reader-page .main-inner {
      max-width: 1200px;
      padding: 40px 24px 64px;
    }
    .chapter-reader-page .flash-area:empty { display: none; }
    .chapter-reader-page .flash-area { margin-bottom: 20px; }
    .cr-reader { display: flex; flex-direction: column; gap: 24px; }
    .cr-header {
      display: flex; flex-direction: column; gap: 16px;
      padding: 24px; background: var(--surface-container);
      border: 1px solid var(--outline-variant); border-radius: 12px;
    }
    .cr-breadcrumb {
      display: flex; align-items: center; gap: 8px;
      color: var(--on-surface-variant); font-size: 12px; line-height: 16px;
    }
    .cr-breadcrumb a { color: var(--on-surface-variant); }
    .cr-breadcrumb a:hover { color: var(--primary); }
    .cr-breadcrumb .material-symbols-outlined { font-size: 16px; }
    .cr-breadcrumb span:last-child { color: var(--on-surface); }
    .cr-heading-row {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 24px;
    }
    .cr-heading { min-width: 0; }
    .cr-title-row { display: flex; align-items: center; flex-wrap: wrap; gap: 16px; }
    .cr-title-row h1 {
      font-family: 'Merriweather', serif; font-size: 30px; line-height: 40px;
      font-weight: 700; letter-spacing: -0.02em;
    }
    .cr-meta { margin: 6px 0 0; color: var(--on-surface-muted); font-size: 12px; }
    .cr-status, .cr-dialog-status {
      display: inline-flex; align-items: center; flex: 0 0 auto;
      padding: 3px 10px; border: 1px solid; border-radius: 999px;
      font-size: 12px; line-height: 16px; font-weight: 500;
    }
    .cr-status-translated, .cr-dialog-status-translated {
      color: var(--secondary); background: rgba(4,180,162,0.1); border-color: rgba(4,180,162,0.25);
    }
    .cr-status-translating, .cr-status-fetching,
    .cr-dialog-status-translating, .cr-dialog-status-fetching {
      color: var(--primary); background: rgba(14,165,233,0.1); border-color: rgba(14,165,233,0.25);
    }
    .cr-status-fetched, .cr-dialog-status-fetched {
      color: var(--tertiary); background: rgba(141,144,255,0.1); border-color: rgba(141,144,255,0.25);
    }
    .cr-status-error, .cr-dialog-status-error {
      color: var(--error); background: rgba(147,0,10,0.18); border-color: rgba(255,180,171,0.25);
    }
    .cr-status-not_fetched, .cr-dialog-status-not_fetched {
      color: var(--on-surface-variant); background: var(--surface-highest); border-color: var(--outline-variant);
    }
    .cr-primary-action form { margin: 0; }
    button.cr-action-button {
      padding: 9px 16px; border-radius: 4px; background: var(--primary-container);
      color: white; font-size: 14px; line-height: 20px; font-weight: 500;
    }
    button.cr-action-button .material-symbols-outlined { font-size: 20px; }
    button.cr-action-button.cr-action-button-retry {
      background: var(--warn);
      color: var(--warn-on);
    }
    button.cr-action-button.cr-action-button-retry:hover {
      filter: brightness(1.05);
    }
    .cr-alert {
      display: flex; align-items: baseline; gap: 10px; padding: 10px 12px;
      border: 1px solid; border-radius: 8px; font-size: 13px;
    }
    .cr-alert strong { flex: 0 0 auto; }
    .cr-alert-error { color: var(--error); background: rgba(147,0,10,0.16); border-color: rgba(255,180,171,0.25); }
    .cr-alert-warning { color: #f4d081; background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.25); }
    .cr-alert-warning a { color: var(--primary); text-decoration: underline; }
    .cr-progress { display: flex; flex-direction: column; gap: 6px; }
    .cr-progress-meta {
      display: flex; justify-content: space-between; gap: 16px;
      color: var(--on-surface-variant); font-size: 12px; line-height: 16px;
    }
    .cr-progress-track { height: 6px; overflow: hidden; background: var(--surface-highest); border-radius: 999px; }
    .cr-progress-fill { height: 100%; background: var(--primary); border-radius: inherit; transition: width 0.4s ease; }
    .cr-progress-fill.is-queued { width: 18%; opacity: 0.65; }
    .cr-tabs {
      display: flex; gap: 28px; min-height: 40px;
      border-bottom: 1px solid var(--outline-variant);
    }
    .cr-tabs a {
      display: flex; align-items: flex-start; padding: 0 4px 12px;
      color: var(--on-surface-variant); border-bottom: 2px solid transparent;
      font-size: 14px; line-height: 20px; font-weight: 500;
    }
    .cr-tabs a:hover { color: var(--on-surface); }
    .cr-tabs a.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
    .cr-reading-card {
      display: grid; background: var(--surface-low); border: 1px solid var(--outline-variant);
      border-radius: 12px; padding: 32px; min-width: 0;
    }
    .cr-reading-pair { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
    .cr-column { min-width: 0; padding: 0 32px; }
    .cr-column:first-child { padding-left: 0; }
    .cr-column:last-child { padding-right: 0; }
    .cr-reading-pair .cr-column + .cr-column { border-left: 1px solid var(--outline-variant); }
    .cr-reading-single .cr-column { max-width: 760px; width: 100%; margin: 0 auto; padding: 0; }
    .cr-column h2 {
      margin: 0 0 18px; padding-bottom: 10px; border-bottom: 1px solid var(--outline-variant);
      color: var(--on-surface); font: 600 18px/24px 'Inter', sans-serif;
    }
    .cr-reading-copy {
      color: var(--on-surface); font: 400 18px/1.8 'Merriweather', serif;
      overflow-wrap: anywhere;
    }
    .cr-reading-copy.cr-chinese {
      color: var(--on-surface-variant);
      font-family: 'Noto Serif SC', 'Songti SC', 'Microsoft YaHei', serif;
    }
    .cr-reading-copy p { margin: 0 0 1.25em; }
    .cr-reading-copy p:last-child { margin-bottom: 0; }
    .cr-empty {
      display: grid; justify-items: center; gap: 8px; padding: 56px 24px;
      color: var(--on-surface-variant); background: var(--surface-low);
      border: 1px solid var(--outline-variant); border-radius: 12px; text-align: center;
    }
    .cr-empty .material-symbols-outlined { color: var(--outline); font-size: 36px; }
    .cr-empty p { margin: 0; color: var(--on-surface); font-weight: 600; }
    .cr-empty small { font-size: 13px; }
    .cr-chapter-nav {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
      padding: 0 4px;
    }
    .cr-chapter-nav > :last-child { justify-self: end; }
    .cr-chapter-nav a, .cr-nav-disabled {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--on-surface-variant); font-size: 14px; line-height: 20px;
    }
    .cr-chapter-nav a:hover { color: var(--primary); }
    .cr-nav-disabled { opacity: 0.3; }
    .cr-chapter-nav .material-symbols-outlined { font-size: 20px; }
    button.cr-list-button {
      padding: 9px 16px; border: 1px solid var(--outline-variant); border-radius: 8px;
      background: var(--surface); color: var(--on-surface-variant); font-weight: 500;
    }
    button.cr-list-button:hover { background: var(--surface-highest); color: var(--on-surface); opacity: 1; }

    .cr-chapter-dialog {
      width: min(480px, calc(100vw - 32px)); max-height: 80vh; margin: auto; padding: 0;
      color: var(--on-surface); background: var(--surface-low); border: 1px solid var(--outline-variant);
      border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.55); overflow: hidden;
    }
    .cr-chapter-dialog::backdrop { background: rgba(6,14,32,0.82); backdrop-filter: blur(3px); }
    .cr-dialog-shell { display: flex; flex-direction: column; max-height: 80vh; }
    .cr-dialog-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid var(--outline-variant);
    }
    .cr-dialog-header h2 { font: 600 24px/32px 'Inter', sans-serif; }
    button.cr-dialog-close {
      width: 36px; height: 36px; padding: 0; border: 0; border-radius: 8px;
      background: transparent; color: var(--on-surface-variant);
    }
    button.cr-dialog-close:hover { background: var(--surface-highest); color: var(--on-surface); opacity: 1; }
    .cr-dialog-search { position: relative; padding: 16px; border-bottom: 1px solid var(--outline-variant); }
    .cr-dialog-search .material-symbols-outlined {
      position: absolute; left: 28px; top: 50%; transform: translateY(-50%);
      color: var(--on-surface-variant); font-size: 18px; pointer-events: none;
    }
    .cr-dialog-search input[type="search"] {
      width: 100%; padding: 10px 12px 10px 38px; border: 1px solid transparent;
      border-radius: 8px; outline: none; background: var(--surface-highest);
      color: var(--on-surface); font: 500 14px/20px 'Inter', sans-serif;
    }
    .cr-dialog-search input[type="search"]:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(137,206,255,0.14); }
    .cr-dialog-list {
      flex: 1; overflow-y: auto; padding: 8px; scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: rgba(137, 206, 255, 0.45) rgba(6, 14, 32, 0.65);
    }
    .cr-dialog-list::-webkit-scrollbar { width: 10px; height: 10px; }
    .cr-dialog-list::-webkit-scrollbar-track {
      background: rgba(6, 14, 32, 0.65); border-radius: 999px;
    }
    .cr-dialog-list::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(137, 206, 255, 0.55), rgba(79, 219, 200, 0.35));
      border: 2px solid rgba(6, 14, 32, 0.85); border-radius: 999px;
    }
    .cr-dialog-list::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(137, 206, 255, 0.8), rgba(79, 219, 200, 0.55));
    }
    .cr-dialog-item {
      display: grid; grid-template-columns: 36px minmax(0, 1fr) auto; align-items: center; gap: 12px;
      min-height: 54px; padding: 10px 12px; margin-bottom: 4px;
      border: 1px solid transparent; border-radius: 8px;
    }
    .cr-dialog-item:hover { color: var(--on-surface); background: var(--surface-highest); }
    .cr-dialog-item.active { background: rgba(137,206,255,0.1); border-color: rgba(137,206,255,0.2); }
    .cr-dialog-index { color: var(--on-surface-variant); font-size: 14px; font-variant-numeric: tabular-nums; }
    .cr-dialog-item.active .cr-dialog-index { color: var(--primary); font-weight: 700; }
    .cr-dialog-title { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; }
    .cr-dialog-item.active .cr-dialog-title { font-weight: 700; }
    .cr-dialog-status { font-size: 11px; }
    .cr-dialog-no-results { padding: 28px 16px; color: var(--on-surface-variant); text-align: center; font-size: 14px; }

    @media (max-width: 768px) {
      .chapter-reader-page .topbar { display: none; }
      .chapter-reader-page .main-inner { padding: 20px 12px 40px; }
      .cr-reader { gap: 18px; }
      .cr-header { padding: 18px; }
      .cr-heading-row { flex-direction: column; gap: 16px; }
      .cr-title-row { gap: 10px; }
      .cr-title-row h1 { font-size: 24px; line-height: 32px; }
      .cr-primary-action { width: 100%; }
      .cr-primary-action form, button.cr-action-button { width: 100%; }
      .cr-alert { align-items: flex-start; flex-direction: column; gap: 2px; }
      .cr-progress-meta span:last-child { text-align: right; }
      .cr-tabs { gap: 18px; overflow-x: auto; }
      .cr-reading-card { padding: 22px 18px; }
      .cr-reading-pair { grid-template-columns: 1fr; }
      .cr-column, .cr-column:first-child, .cr-column:last-child { padding: 0; }
      .cr-reading-pair .cr-column + .cr-column {
        margin-top: 26px; padding-top: 26px; border-left: 0; border-top: 1px solid var(--outline-variant);
      }
      .cr-reading-copy { font-size: 16px; line-height: 1.75; }
      .cr-chapter-nav a, .cr-nav-disabled { font-size: 0; gap: 0; }
      .cr-chapter-nav a .material-symbols-outlined,
      .cr-nav-disabled .material-symbols-outlined { font-size: 22px; }
      .cr-dialog-header { padding: 16px 18px; }
      .cr-dialog-header h2 { font-size: 20px; line-height: 28px; }
      .cr-dialog-item { grid-template-columns: 30px minmax(0, 1fr); }
      .cr-dialog-status { grid-column: 2; justify-self: start; }
    }
  </style>
</head>
<body class="{% block body_class %}{% endblock %}">

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="document.querySelector('.sidebar').classList.remove('open'); this.classList.remove('show');"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h2>DỊCH TRUYỆN</h2>
      <p>Author: Đạt Côn</p>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item {% if active_nav == 'home' %}active{% endif %}">
        <span class="material-symbols-outlined fill" data-icon="library_books">library_books</span>
        Thư viện
      </a>
      <a href="/settings/api" class="nav-item {% if active_nav == 'settings' %}active{% endif %}">
        <span class="material-symbols-outlined" data-icon="settings">settings</span>
        Cài đặt
      </a>
    </nav>
    <div class="sidebar-footer">
      Local tool &middot; SQLite
    </div>
  </aside>

  <!-- Mobile topbar -->
  <header class="topbar">
    <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show');">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <div style="font-size:18px; font-weight:600; color:var(--on-surface)">Dịch Hiệp</div>
    <div style="width:40px"></div>
  </header>

  <!-- Main content -->
  <div class="main-content">
    <div class="main-inner">
      <div class="flash-area">
        {% if flash %}
          <div class="alert {{ flash.type }}">
            <span class="alert-title">{{ flash.type == 'error' and 'Lỗi' or (flash.type == 'success' and 'Thành công' or 'Thông báo') }}</span>
            {{ flash.message }}
          </div>
        {% endif %}
      </div>
      {% block content %}{% endblock %}
    </div>
  </div>

</body>
</html>
