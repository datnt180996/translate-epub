<div id="nd-stats"
     {% if oob %}hx-swap-oob="outerHTML"{% endif %}
     {% if poll_url %}
       hx-get="{{ poll_url }}"
       hx-trigger="every 5s, novel-chapters-refresh from:body"
       hx-target="#nd-stats"
       hx-swap="outerHTML"
     {% endif %}
     class="nd-stats">
  <div class="nd-stat">
    <div class="nd-stat-head">
      <span class="nd-stat-label">Tổng chương</span>
      <span class="material-symbols-outlined">list_alt</span>
    </div>
    <div class="nd-stat-value">{{ stats.total }}</div>
  </div>
  <div class="nd-stat">
    <div class="nd-stat-head">
      <span class="nd-stat-label">Bản gốc</span>
      <span class="material-symbols-outlined">cloud_done</span>
    </div>
    <div class="nd-stat-value">{{ stats.raw }}</div>
  </div>
  <div class="nd-stat">
    <div class="nd-stat-head">
      <span class="nd-stat-label success">Đã dịch</span>
      <span class="material-symbols-outlined">check_circle</span>
    </div>
    <div class="nd-stat-value">{{ stats.translated }}</div>
  </div>
  <div class="nd-stat {% if stats.active_error %}nd-pulse{% endif %}">
    <div class="nd-stat-head">
      <span class="nd-stat-label error">Lỗi/Dịch</span>
      <span class="material-symbols-outlined">sync_problem</span>
    </div>
    <div class="nd-stat-value">{{ stats.active_error }}</div>
  </div>
</div>
